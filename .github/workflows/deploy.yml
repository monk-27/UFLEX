name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main
  # Allows you to manually trigger the deployment from the Actions tab
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Build Project
        run: npm run build
        env:
          NEXT_PUBLIC_USE_PHP_BACKEND: ${{ secrets.NEXT_PUBLIC_USE_PHP_BACKEND }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD_B64: ${{ secrets.FTP_PASSWORD_B64 }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_SECURE: ${{ secrets.FTP_SECURE }}
          FTP_UPLOAD_DIR: ${{ secrets.FTP_UPLOAD_DIR }}
          UPLOAD_PUBLIC_URL: ${{ secrets.UPLOAD_PUBLIC_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD_B64: ${{ secrets.DB_PASSWORD_B64 }}
          DB_NAME: ${{ secrets.DB_NAME }}

      - name: 🚀 Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # These are secure secrets you will set inside your GitHub repository settings
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          
          # The local Next.js export folder that gets generated
          local-dir: ./out/
          
          # The destination folder on your cPanel. (Make sure this ends with a slash!)
          # If your primary domain points to public_html, leave this as public_html/
          server-dir: public_html/
          
          # This ensures that hidden files like .htaccess are also uploaded
          # We also exclude the uploads folder here so it never gets deleted.
          exclude: |
            **/.git*
            **/.git*/**
            uploads/**
            uploads/
            .env.local
